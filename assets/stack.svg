<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Header -->
  <text x="40" y="62" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#f0f6fc">JailCall — built with</text>
  <text x="40" y="96" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#8b949e">Six external services. One number that always answers.</text>

  <!-- ===== Row 1 ===== -->

  <!-- Card 1: AgentPhone -->
  <g transform="translate(40, 140)">
    <rect width="380" height="240" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="30" y="56" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffa657">AgentPhone</text>
    <text x="350" y="36" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#7d8590" letter-spacing="1.2">RUNTIME</text>
    <line x1="30" y1="76" x2="80" y2="76" stroke="#ffa657" stroke-width="3"/>
    <text x="30" y="118" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#c9d1d9">
      <tspan x="30" dy="0">Inbound voice number on</tspan>
      <tspan x="30" dy="24">the jail line — handles call</tspan>
      <tspan x="30" dy="24">audio, speech-to-text, and</tspan>
      <tspan x="30" dy="24">text-to-speech for the agent.</tspan>
    </text>
  </g>

  <!-- Card 2: Google Gemini -->
  <g transform="translate(450, 140)">
    <rect width="380" height="240" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="30" y="56" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#7ee787">Google Gemini</text>
    <text x="350" y="36" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#7d8590" letter-spacing="1.2">RUNTIME</text>
    <line x1="30" y1="76" x2="80" y2="76" stroke="#7ee787" stroke-width="3"/>
    <text x="30" y="118" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#c9d1d9">
      <tspan x="30" dy="0">Gemini 2.5 Flash-Lite is the</tspan>
      <tspan x="30" dy="24">LLM driving the tool-call</tspan>
      <tspan x="30" dy="24">loop and answering caller</tspan>
      <tspan x="30" dy="24">questions from case context.</tspan>
    </text>
  </g>

  <!-- Card 3: Moss -->
  <g transform="translate(860, 140)">
    <rect width="380" height="240" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="30" y="56" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#79c0ff">Moss</text>
    <text x="350" y="36" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#7d8590" letter-spacing="1.2">RUNTIME</text>
    <line x1="30" y1="76" x2="80" y2="76" stroke="#79c0ff" stroke-width="3"/>
    <text x="30" y="118" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#c9d1d9">
      <tspan x="30" dy="0">Sub-10ms semantic search</tspan>
      <tspan x="30" dy="24">over a pre-built Bay Area</tspan>
      <tspan x="30" dy="24">criminal defense attorney</tspan>
      <tspan x="30" dy="24">roster, queried by charge.</tspan>
    </text>
  </g>

  <!-- ===== Row 2 ===== -->

  <!-- Card 4: AgentMail -->
  <g transform="translate(40, 410)">
    <rect width="380" height="240" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="30" y="56" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffa657">AgentMail</text>
    <text x="350" y="36" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#7d8590" letter-spacing="1.2">RUNTIME</text>
    <line x1="30" y1="76" x2="80" y2="76" stroke="#ffa657" stroke-width="3"/>
    <text x="30" y="118" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#c9d1d9">
      <tspan x="30" dy="0">Sends parallel client-intake</tspan>
      <tspan x="30" dy="24">emails to the firms Moss</tspan>
      <tspan x="30" dy="24">returns. Inbound webhook</tspan>
      <tspan x="30" dy="24">ingests attorney replies.</tspan>
    </text>
  </g>

  <!-- Card 5: Supermemory -->
  <g transform="translate(450, 410)">
    <rect width="380" height="240" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="30" y="56" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#d2a8ff">Supermemory</text>
    <text x="350" y="36" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#7d8590" letter-spacing="1.2">RUNTIME</text>
    <line x1="30" y1="76" x2="80" y2="76" stroke="#d2a8ff" stroke-width="3"/>
    <text x="30" y="118" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#c9d1d9">
      <tspan x="30" dy="0">Persists case context across</tspan>
      <tspan x="30" dy="24">calls — name, charge, firms</tspan>
      <tspan x="30" dy="24">contacted, attorney replies.</tspan>
      <tspan x="30" dy="24">Auto-recalled per webhook.</tspan>
    </text>
  </g>

  <!-- Card 6: Browser Use -->
  <g transform="translate(860, 410)">
    <rect width="380" height="240" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="30" y="56" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ff7b72">Browser Use</text>
    <text x="350" y="36" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#7d8590" letter-spacing="1.2">BUILD-TIME</text>
    <line x1="30" y1="76" x2="80" y2="76" stroke="#ff7b72" stroke-width="3"/>
    <text x="30" y="118" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#c9d1d9">
      <tspan x="30" dy="0">One-shot crawler that</tspan>
      <tspan x="30" dy="24">scrapes law firm websites</tspan>
      <tspan x="30" dy="24">for intake emails, feeding</tspan>
      <tspan x="30" dy="24">the Moss index.</tspan>
    </text>
  </g>

  <!-- Footer -->
  <text x="40" y="700" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6e7681">Call My Agent hackathon · 2026-05-17</text>
</svg>
